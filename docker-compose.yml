version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/multi-tenant-booking
      - MONGO_TEST_URI=mongodb://mongodb:27017/multi-tenant-booking-test
      - PORT=5000
      - JWT_SECRET=supersecret123
      - NODE_ENV=production
    depends_on:
      - mongodb
    restart: always

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

volumes:
  mongodb_data:
